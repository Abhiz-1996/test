<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Ananthu & Anagha</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

<div class="overlay" id="overlay">
  <div class="invite-card">
    <h2>You’re Invited</h2>
    <button onclick="openInvite()">Open Invitation</button>
  </div>
</div>

<section class="hero">
  <h1>Ananthu <span>&</span> Anagha</h1>
  <p>June 17, 2026 • 6:00 PM</p>
</section>

<section class="countdown">
  <h2>Countdown</h2>
  <div id="timer"></div>
</section>

<section class="details">
  <h2>Wedding Details</h2>
  <p>Venue: Grand Convention Hall</p>
  <p>Kerala, India</p>
</section>

<section class="gallery">
  <h2>Moments</h2>
  <div class="grid">
    <img src="https://picsum.photos/300?1"/>
    <img src="https://picsum.photos/300?2"/>
    <img src="https://picsum.photos/300?3"/>
  </div>
</section>

<section class="rsvp">
  <h2>RSVP</h2>
  <form>
    <input type="text" placeholder="Your Name" required/>
    <input type="email" placeholder="Email" required/>
    <button>Submit</button>
  </form>
</section>

<footer>
  <p>Made with ❤️</p>
</footer>

<script src="script.js"></script>
</body>
</html>
